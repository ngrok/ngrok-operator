suite: test controller-rbac
templates:
- controller-rbac.yaml
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
- it: should create a leader election role
  documentIndex: 0
  asserts:
  - isKind:
      of: Role
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-leader-election-role
- it: should create a leader election rolebinding
  documentIndex: 1
  asserts:
  - isKind:
      of: RoleBinding
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-leader-election-rolebinding
- it: should create a manager rolebinding
  documentIndex: 2
  asserts:
  - isKind:
      of: ClusterRoleBinding
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-manager-rolebinding
