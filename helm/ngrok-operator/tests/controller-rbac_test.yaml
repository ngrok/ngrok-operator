suite: test controller-rbac
templates:
- controller-rbac.yaml
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
# Tests for single-namespace (watchNamespace) mode
- it: should create a RoleBinding for manager when watchNamespace is set
  documentIndex: 2
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - isKind:
      of: RoleBinding
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-manager-rolebinding
  - equal:
      path: metadata.namespace
      value: my-namespace
  - equal:
      path: roleRef.kind
      value: Role
  - equal:
      path: roleRef.name
      value: RELEASE-NAME-ngrok-operator-manager-role

- it: should create a ClusterRoleBinding for cluster-scoped resources when watchNamespace is set
  documentIndex: 3
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - isKind:
      of: ClusterRoleBinding
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-manager-cluster-rolebinding
  - equal:
      path: roleRef.kind
      value: ClusterRole
  - equal:
      path: roleRef.name
      value: RELEASE-NAME-ngrok-operator-manager-cluster-role

- it: should create a ClusterRoleBinding for manager when watchNamespace is not set
  documentIndex: 2
  asserts:
  - isKind:
      of: ClusterRoleBinding
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-manager-rolebinding
  - equal:
      path: roleRef.kind
      value: ClusterRole
  - equal:
      path: roleRef.name
      value: RELEASE-NAME-ngrok-operator-manager-role

- it: should match snapshot when watchNamespace is set
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - matchSnapshot: {}

- it: should support deprecated watchNamespace value
  documentIndex: 2
  set:
    watchNamespace: legacy-ns
  asserts:
  - isKind:
      of: RoleBinding
  - equal:
      path: metadata.namespace
      value: legacy-ns
