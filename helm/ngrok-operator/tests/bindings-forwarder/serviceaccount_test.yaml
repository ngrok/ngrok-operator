suite: test bindings forwarder serviceaccount
templates:
- bindings-forwarder/serviceaccount.yaml
release:
  name: test-release
  namespace: test-namespace
set:
  features.bindings.enabled: true
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
- it: should not create a serviceaccount if features.bindings.enabled is false
  set:
    features.bindings.enabled: false
  asserts:
  - hasDocuments:
      count: 0
- it: should create the bindings forwarder serviceaccount
  asserts:
  - isKind:
      of: ServiceAccount
  - isAPIVersion:
      of: v1
  - hasDocuments:
      count: 1
- it: does not generate a serviceaccount when bindingsForwarder.serviceAccount.create is false
  set:
    bindingsForwarder.serviceAccount.create: false
  asserts:
  - hasDocuments:
      count: 0
- it: Creates a service account using .Values.bindingsForwarder.serviceAccount.name if set
  set:
    bindingsForwarder.serviceAccount.name: test-serviceaccount
  asserts:
  - equal:
      path: metadata.name
      value: test-serviceaccount
