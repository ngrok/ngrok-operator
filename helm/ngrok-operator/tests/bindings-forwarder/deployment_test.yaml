suite: test bindings forwarder deployment
templates:
- bindings-forwarder/deployment.yaml
- bindings-forwarder/role.yaml
set:
  features:
    bindings:
      enabled: true
tests:
- it: Should match snapshot
  template: bindings-forwarder/deployment.yaml
  asserts:
  - matchSnapshot: {}
- it: should not create a deployment if features.bindings.enabled is false
  set:
    features.bindings.enabled: false
  template: bindings-forwarder/deployment.yaml
  asserts:
  - hasDocuments:
      count: 0
- it: should not create a deployment in one-click demo mode
  set:
    apiManager.config.oneClickDemoMode: true
  template: bindings-forwarder/deployment.yaml
  asserts:
  - hasDocuments:
      count: 0
- it: should create a deployment if features.bindings.enabled is true
  template: bindings-forwarder/deployment.yaml
  asserts:
  - isKind:
      of: Deployment
  - isAPIVersion:
      of: apps/v1
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-bindings-forwarder
- it: Does not pass any --config args
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.containers[0].args
      value:
      - bindings-forwarder-manager
      - --release-name=RELEASE-NAME
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=:8080
      - --manager-name=RELEASE-NAME-ngrok-operator-bindings-forwarder
- it: Injects config from the config ConfigMap via environment variables
  template: bindings-forwarder/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: NGROK_OPERATOR_LOG_LEVEL
        valueFrom:
          configMapKeyRef:
            name: RELEASE-NAME-ngrok-operator-bindings-forwarder-config
            key: log.level
            optional: true
- it: Does not mount any config files or volumes by default
  template: bindings-forwarder/deployment.yaml
  asserts:
  - notExists:
      path: spec.template.spec.containers[0].volumeMounts
  - notExists:
      path: spec.template.spec.volumes
- it: Renders extra volumes and extra volume mounts alone
  set:
    bindingsForwarder:
      extraVolumes:
      - name: test-volume
        emptyDir: {}
      extraVolumeMounts:
      - name: test-volume
        mountPath: /test-volume
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.volumes
      value:
      - name: test-volume
        emptyDir: {}
  - equal:
      path: spec.template.spec.containers[0].volumeMounts
      value:
      - name: test-volume
        mountPath: /test-volume
- it: Sets a checksum annotation for the config
  template: bindings-forwarder/deployment.yaml
  asserts:
  - isNotNullOrEmpty:
      path: spec.template.metadata.annotations["checksum/config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/common-config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/component-config"]
- it: Should set default bindingsForwarder.updateStrategy.type to RollingUpdate in values.yaml
  set:
    bindingsForwarder:
      updateStrategy:
        type: RollingUpdate
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.strategy.type
      value: RollingUpdate
- it: Adds .Values.bindingsForwarder.podLabels to the bindings forwarder podspec
  set:
    bindingsForwarder:
      podLabels:
        labelKey1: labelValue1
        labelKey2: labelValue2
  template: bindings-forwarder/deployment.yaml
  asserts:
  - isSubset:
      path: spec.template.metadata.labels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Does not add .Values.bindingsForwarder.podLabels to the deployment's selector
  set:
    bindingsForwarder:
      podLabels:
        labelKey1: labelValue1
        labelKey2: labelValue2
  template: bindings-forwarder/deployment.yaml
  asserts:
  - isNotSubset:
      path: spec.selector.matchLabels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Supports selecting which nodes the bindings forwarders should run on with node selectors
  set:
    bindingsForwarder:
      nodeSelector: &nodeSelector
        disktype: ssd
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.nodeSelector
      value: *nodeSelector
- it: Supports setting tolerations on the bindings forwarder pods
  set:
    bindingsForwarder:
      tolerations:
      - &toleration
        key: "key1"
        operator: "Equal"
        value: "value1"
        effect: "NoSchedule"
  template: bindings-forwarder/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.tolerations
      content: *toleration
- it: Supports setting topologySpreadConstraints on the bindings forwarder pods
  set:
    bindingsForwarder:
      topologySpreadConstraints:
      - &tsc
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: foo
        matchLabelKeys:
          - pod-template-hash
  template: bindings-forwarder/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.topologySpreadConstraints
      content: *tsc
- it: Supports setting resources on the bindings forwarder pods
  set:
    bindingsForwarder:
      resources: &resources
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.containers[0].resources
      value: *resources
- it: Sets terminationGracePeriodSeconds by default
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 30
- it: Allows overriding terminationGracePeriodSeconds for the bindings forwarder
  set:
    bindingsForwarder:
      terminationGracePeriodSeconds: 75
  template: bindings-forwarder/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 75
