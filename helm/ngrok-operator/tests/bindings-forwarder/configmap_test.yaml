suite: test bindings forwarder configmap
templates:
- bindings-forwarder/configmap.yaml
set:
  features:
    bindings:
      enabled: true
tests:
- it: Does not render when the bindings feature is disabled
  set:
    features.bindings.enabled: false
  asserts:
  - hasDocuments:
      count: 0
- it: Does not render in one-click demo mode
  set:
    apiManager.config.oneClickDemoMode: true
  asserts:
  - hasDocuments:
      count: 0
- it: Renders a configmap with one data key per config entry
  asserts:
  - isKind:
      of: ConfigMap
  - hasDocuments:
      count: 1
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-bindings-forwarder-config
  - equal:
      path: data["log.level"]
      value: "info"
  - equal:
      path: data["features.bindings.enabled"]
      value: "true"
  - notExists:
      path: data["oneClickDemoMode"]
- it: Merges bindings forwarder config entries over the shared config
  set:
    bindingsForwarder.config:
      log.level: debug
  asserts:
  - equal:
      path: data["log.level"]
      value: "debug"
