suite: test controller-deployment
templates:
- api-manager/deployment.yaml
# The following included templates are needed due to the way helm unittest works.
# It won't load the templates unless they are included here. Due to the checksums
# we are including on the deployment, we need to include them here. It makes the
# snapshot much larger than it needs to be, but it's the only way to test the
# deployment at this time.
- api-manager/role.yaml
- api-manager/leader-election-role.yaml
- credentials-secret.yaml
tests:
- it: Should match default snapshot
  asserts:
  - matchSnapshot: {}
- it: Should match all-options snapshot
  set:
    apiManager:
      extraEnv:
        TEST_ENV_VAR: test
        SECRET_ENV_VAR:
          secretKeyRef:
            key: test-key
          value: test-value
      extraVolumes:
      - name: test-volume
        emptyDir: {}
      extraVolumeMounts:
      - name: test-volume
        mountPath: /test-volume
  asserts:
  - matchSnapshot: {}
- it: Does not pass any --config args
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - equal:
      path: spec.template.spec.containers[0].args
      value:
      - api-manager
      - --release-name=RELEASE-NAME
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=:8080
      - --election-id=RELEASE-NAME-ngrok-operator-leader
      - --manager-name=RELEASE-NAME-ngrok-operator-manager
- it: Injects config from the config ConfigMap via environment variables
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: NGROK_OPERATOR_LOG_LEVEL
        valueFrom:
          configMapKeyRef:
            name: RELEASE-NAME-ngrok-operator-api-manager-config
            key: log.level
            optional: true
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: NGROK_OPERATOR_FEATURES_INGRESS_ENABLED
        valueFrom:
          configMapKeyRef:
            name: RELEASE-NAME-ngrok-operator-api-manager-config
            key: features.ingress.enabled
            optional: true
- it: Does not mount any config files or volumes by default
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - notExists:
      path: spec.template.spec.containers[0].volumeMounts
  - notExists:
      path: spec.template.spec.volumes
- it: Sets a checksum annotation for the config
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - isNotNullOrEmpty:
      path: spec.template.metadata.annotations["checksum/config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/common-config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/component-config"]
- it: Should use the specified secret name for the credentials secret
  set:
    credentials.secret.name: test-secret-name
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - matchRegex:
      path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
      pattern: test-secret-name
- it: Should pass through extra volumes and extra volume mounts
  set:
    apiManager:
      extraVolumes:
      - name: test-volume
        emptyDir: {}
      extraVolumeMounts:
      - name: test-volume
        mountPath: /test-volume
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - equal:
      path: spec.template.spec.volumes
      value:
      - name: test-volume
        emptyDir: {}
  - equal:
      path: spec.template.spec.containers[0].volumeMounts
      value:
      - name: test-volume
        mountPath: /test-volume
- it: Defaults to having "soft" pod anti-affinity
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - equal:
      path: spec.template.spec.affinity.podAntiAffinity
      value:
        preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: controller
                app.kubernetes.io/instance: RELEASE-NAME
                app.kubernetes.io/name: ngrok-operator
            topologyKey: kubernetes.io/hostname
          weight: 1
- it: Easily allows for setting a "hard" pod anti-affinity
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  set:
    apiManager.podAntiAffinityPreset: "hard"
  asserts:
  - equal:
      path: spec.template.spec.affinity.podAntiAffinity
      value:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: RELEASE-NAME
              app.kubernetes.io/name: ngrok-operator
          topologyKey: kubernetes.io/hostname
- it: Allows overriding the full affinity
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  set:
    apiManager:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - antarctica-east1
                - antarctica-west1
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: another-node-label-key
                operator: In
                values:
                - another-node-label-value
  asserts:
  - equal:
      path: spec.template.spec.affinity
      value:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - antarctica-east1
                - antarctica-west1
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: another-node-label-key
                operator: In
                values:
                - another-node-label-value
- it: Defaults to not specifying a priority class
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - notExists:
      path: spec.template.spec.priorityClassName
- it: Allows setting a priority class
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  set:
    apiManager.priorityClassName: "high-priority"
  asserts:
  - equal:
      path: spec.template.spec.priorityClassName
      value: high-priority
- it: Sets terminationGracePeriodSeconds by default
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 30
- it: Allows overriding terminationGracePeriodSeconds
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  set:
    apiManager.terminationGracePeriodSeconds: 120
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 120
- it: Adds .Values.apiManager.podLabels to the controller deployment podspec
  set:
    apiManager.podLabels:
      labelKey1: labelValue1
      labelKey2: labelValue2
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - isSubset:
      path: spec.template.metadata.labels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Does not add .Values.apiManager.podLabels to the controller deployment's selector
  set:
    apiManager.podLabels:
      labelKey1: labelValue1
      labelKey2: labelValue2
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - isNotSubset:
      path: spec.selector.matchLabels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Adds .Values.apiManager.podAnnotations to the controller deployment podspec
  set:
    apiManager.podAnnotations:
      annotationKey1: annotationValue1
  template: api-manager/deployment.yaml
  documentIndex: 0 # Document 0 is the deployment since its the first template
  asserts:
  - isSubset:
      path: spec.template.metadata.annotations
      content:
        annotationKey1: annotationValue1
- it: Supports selecting which nodes the manager should run on with node selectors
  set:
    apiManager.nodeSelector: &nodeSelector
      disktype: ssd
  template: api-manager/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.nodeSelector
      value: *nodeSelector
- it: Supports setting tolerations on the manager pods
  set:
    apiManager.tolerations:
    - &toleration
      key: "key1"
      operator: "Equal"
      value: "value1"
      effect: "NoSchedule"
  template: api-manager/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.tolerations
      content: *toleration
- it: Supports setting topologySpreadConstraints on the manager pods
  set:
    apiManager.topologySpreadConstraints:
    - &tsc
      maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: foo
      matchLabelKeys:
        - pod-template-hash
  template: api-manager/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.topologySpreadConstraints
      content: *tsc
