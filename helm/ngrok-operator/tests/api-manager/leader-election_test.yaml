suite: test api-manager leader election
templates:
- api-manager/leader-election-role.yaml
tests:
- it: should match snapshot
  asserts:
  - matchSnapshot: {}
- it: should create a leader election Role
  documentIndex: 0
  asserts:
  - isKind:
      of: Role
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-leader-election-role
- it: should create a leader election RoleBinding
  documentIndex: 1
  asserts:
  - isKind:
      of: RoleBinding
  - equal:
      path: metadata.name
      value: RELEASE-NAME-ngrok-operator-leader-election-rolebinding
