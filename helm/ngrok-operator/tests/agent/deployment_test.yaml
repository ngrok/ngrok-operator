suite: test agent deployment
templates:
- agent/deployment.yaml
- agent/role.yaml
set:
  features:
    ingress:
      enabled: true
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
- it: Does not render when the ingress feature is disabled
  set:
    features.ingress.enabled: false
  template: agent/deployment.yaml
  asserts:
  - hasDocuments:
      count: 0
- it: Does not render in one-click demo mode
  set:
    apiManager.config.oneClickDemoMode: true
  template: agent/deployment.yaml
  asserts:
  - hasDocuments:
      count: 0
- it: Does not pass any --config args
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.containers[0].args
      value:
      - agent-manager
      - --release-name=RELEASE-NAME
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=:8080
      - --manager-name=RELEASE-NAME-ngrok-operator-agent-manager
- it: Injects config from the config ConfigMap via environment variables
  template: agent/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: NGROK_OPERATOR_LOG_LEVEL
        valueFrom:
          configMapKeyRef:
            name: RELEASE-NAME-ngrok-operator-agent-config
            key: log.level
            optional: true
- it: Does not mount any config files or volumes by default
  template: agent/deployment.yaml
  asserts:
  - notExists:
      path: spec.template.spec.containers[0].volumeMounts
  - notExists:
      path: spec.template.spec.volumes
- it: Renders extra volumes and extra volume mounts alone
  set:
    agent:
      extraVolumes:
      - name: test-volume
        emptyDir: {}
      extraVolumeMounts:
      - name: test-volume
        mountPath: /test-volume
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.volumes
      value:
      - name: test-volume
        emptyDir: {}
  - equal:
      path: spec.template.spec.containers[0].volumeMounts
      value:
      - name: test-volume
        mountPath: /test-volume
- it: Sets a checksum annotation for the config
  template: agent/deployment.yaml
  asserts:
  - isNotNullOrEmpty:
      path: spec.template.metadata.annotations["checksum/config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/common-config"]
  - notExists:
      path: spec.template.metadata.annotations["checksum/component-config"]
- it: Should set default agent.updateStrategy.type to RollingUpdate in values.yaml
  set:
    agent:
      updateStrategy:
        type: RollingUpdate
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.strategy.type
      value: RollingUpdate
- it: Adds .Values.agent.podLabels to the agent deployment podspec
  set:
    agent:
      podLabels:
        labelKey1: labelValue1
        labelKey2: labelValue2
  template: agent/deployment.yaml
  asserts:
  - isSubset:
      path: spec.template.metadata.labels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Does not add .Values.agent.podLabels to the agent deployment's selector
  set:
    agent:
      podLabels:
        labelKey1: labelValue1
        labelKey2: labelValue2
  template: agent/deployment.yaml
  asserts:
  - isNotSubset:
      path: spec.selector.matchLabels
      content:
        labelKey1: labelValue1
        labelKey2: labelValue2
- it: Supports selecting which nodes the agent should run on with node selectors
  set:
    agent:
      nodeSelector: &nodeSelector
        disktype: ssd
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.nodeSelector
      value: *nodeSelector
- it: Supports setting tolerations on the agent pods
  set:
    agent:
      tolerations:
      - &toleration
        key: "key1"
        operator: "Equal"
        value: "value1"
        effect: "NoSchedule"
  template: agent/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.tolerations
      content: *toleration
- it: Supports setting topologySpreadConstraints on the agent pods
  set:
    agent:
      topologySpreadConstraints:
      - &tsc
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: foo
        matchLabelKeys:
          - pod-template-hash
  template: agent/deployment.yaml
  asserts:
  - contains:
      path: spec.template.spec.topologySpreadConstraints
      content: *tsc
- it: Supports setting resources on the agent pods
  set:
    agent:
      resources: &resources
        requests:
          memory: "128Mi"
          cpu: "500m"
        limits:
          memory: "256Mi"
          cpu: "1000m"
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.containers[0].resources
      value: *resources
- it: Sets terminationGracePeriodSeconds by default
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 30
- it: Allows overriding terminationGracePeriodSeconds for the agent
  set:
    agent:
      terminationGracePeriodSeconds: 45
  template: agent/deployment.yaml
  asserts:
  - equal:
      path: spec.template.spec.terminationGracePeriodSeconds
      value: 45
- it: Uses agent.podAnnotations on the agent pods
  set:
    agent:
      podAnnotations:
        agent-annotation: agent-value
  template: agent/deployment.yaml
  asserts:
  - isSubset:
      path: spec.template.metadata.annotations
      content:
        agent-annotation: agent-value
- it: Supports Datadog autodiscovery annotations on agent pods
  set:
    agent:
      podAnnotations:
        ad.datadoghq.com/agent.logs: '[{"service":"ngrok-agent","source":"ngrok-agent"}]'
  template: agent/deployment.yaml
  asserts:
  - isSubset:
      path: spec.template.metadata.annotations
      content:
        ad.datadoghq.com/agent.logs: '[{"service":"ngrok-agent","source":"ngrok-agent"}]'
