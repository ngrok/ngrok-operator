suite: test agent rbac
templates:
- rbac/agent.yaml
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
- it: should create a clusterrole
  documentIndex: 0
  asserts:
  - isKind:
      of: ClusterRole
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
- it: should create a clusterrolebinding
  documentIndex: 1
  asserts:
  - isKind:
      of: ClusterRoleBinding
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
# Tests for single-namespace (watchNamespace) mode
- it: should create a Role when watchNamespace is set
  documentIndex: 0
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - isKind:
      of: Role
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
  - equal:
      path: metadata.namespace
      value: my-namespace

- it: should create a RoleBinding when watchNamespace is set
  documentIndex: 1
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - isKind:
      of: RoleBinding
  - isAPIVersion:
      of: rbac.authorization.k8s.io/v1
  - equal:
      path: metadata.namespace
      value: my-namespace
  - equal:
      path: roleRef.kind
      value: Role

- it: should match snapshot when watchNamespace is set
  set:
    ingress.watchNamespace: my-namespace
  asserts:
  - matchSnapshot: {}

- it: should support deprecated watchNamespace value
  documentIndex: 0
  set:
    watchNamespace: legacy-ns
  asserts:
  - isKind:
      of: Role
  - equal:
      path: metadata.namespace
      value: legacy-ns
