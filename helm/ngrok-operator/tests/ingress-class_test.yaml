suite: test ingress-class
templates:
- ingress-class.yaml
tests:
- it: Should match snapshot
  asserts:
  - matchSnapshot: {}
- it: Creates a default ingress class called ngrok by default
  asserts:
  - isKind:
      of: IngressClass
  - hasDocuments:
      count: 1
  - equal:
      path: metadata.name
      value: ngrok
- it: Does not create an ingress class when features.ingress.enabled is false
  set:
    features.ingress.enabled: false
  asserts:
  - hasDocuments:
      count: 0
- it: Does not create an ingress class when features.ingress.ingressClass.create is false
  set:
    features.ingress.ingressClass.create: false
  asserts:
  - hasDocuments:
      count: 0
- it: Allows renaming the ingress class
  set:
    features.ingress.ingressClass.name: custom-class
  asserts:
  - equal:
      path: metadata.name
      value: custom-class
- it: Is not the default ingress class by default
  asserts:
  - notExists:
      path: metadata.annotations
- it: Can be marked as the default ingress class
  set:
    features.ingress.ingressClass.default: true
  asserts:
  - equal:
      path: metadata.annotations["ingressclass.kubernetes.io/is-default-class"]
      value: "true"
- it: Uses the configured controller name
  set:
    features.ingress.controllerName: example.com/my-controller
  asserts:
  - equal:
      path: spec.controller
      value: example.com/my-controller
