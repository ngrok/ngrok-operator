##
## @section Common parameters
##
## @param nameOverride String to partially override generated resource names
## @param fullnameOverride String to fully override generated resource names
## @param commonLabels Labels to add to all deployed objects
## @param commonAnnotations Annotations to add to all deployed objects
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

##
## @section Image configuration
##
## @param image.registry The ngrok operator image registry.
## @param image.repository The ngrok operator image repository.
## @param image.tag The ngrok operator image tag. Defaults to the chart's appVersion if not specified
## @param image.pullPolicy The ngrok operator image pull policy.
## @param image.pullSecrets An array of imagePullSecrets to be used when pulling the image.
##
image:
  registry: docker.io
  repository: ngrok/ngrok-operator
  tag: ""
  pullPolicy: IfNotPresent
  ## Example
  ## pullSecrets:
  ## - name: my-imagepull-secret
  ##
  pullSecrets: []

##
## @section ngrok configuration
##
## Platform connection configuration shared by all components. These values are
## rendered into each component's config ConfigMap and injected into the pods
## as NGROK_OPERATOR_* environment variables. Explicit CLI flags override the
## environment; the environment overrides the binaries' built-in defaults.
##
## @param ngrok.description ngrok-operator description that will appear in the ngrok dashboard
## @param ngrok.region ngrok region to create tunnels in. Defaults to connect to the closest geographical region.
## @param ngrok.rootCAs Set to "trusted" for the ngrok agent CA or "host" to trust the host's CA. Defaults to "trusted".
## @param ngrok.serverAddr This is the address of the ngrok server to connect to. You should set this if you are using a custom ingress address.
## @param ngrok.apiURL This is the URL of the ngrok API. You should set this if you are using a custom API URL.
## @param ngrok.metadata This is a map of key/value pairs that will be added as metadata to all ngrok api resources created
## @param ngrok.clusterDomain Configure the default cluster base domain for your kubernetes cluster DNS resolution
## @param ngrok.log.level The level to log at. One of 'debug', 'info', or 'error'.
## @param ngrok.log.format The log format to use. One of console, json.
## @param ngrok.log.stacktraceLevel The level to report stacktrace logs one of 'info' or 'error'.
##
ngrok:
  description: "The official ngrok Kubernetes Operator."
  region: "" # empty means global or all regions
  rootCAs: ""
  serverAddr: ""
  apiURL: "" # default to ngrok-api-go SDK's default
  metadata: {}
  clusterDomain: svc.cluster.local
  log:
    level: info
    format: json
    stacktraceLevel: error

##
## @section Credentials configuration
##
## @param credentials.secret.name The name of the secret the credentials are in. If not provided, one will be generated using the helm release name.
## @param credentials.apiKey Your ngrok API key. If provided, it will be written to the secret and the authtoken must be provided as well.
## @param credentials.authtoken Your ngrok authtoken. If provided, it will be written to the secret and the apiKey must be provided as well.
##
credentials:
  secret:
    name: ""
  apiKey: ""
  authtoken: ""

##
## @section Features configuration
##
## Feature flags and feature-specific configuration. This is the single source
## of truth for what is enabled and how each feature is configured. These
## values are rendered into each component's config ConfigMap and injected
## into the pods as NGROK_OPERATOR_* environment variables.
##
features:
  ## @param features.ingress.enabled When true, enable the Ingress controller features
  ## @param features.ingress.controllerName The name of the controller to look for matching ingress classes
  ## @param features.ingress.watchNamespace The namespace to watch for ingress resources (default all)
  ## @param features.ingress.ingressClass.name The name of the ingress class to use.
  ## @param features.ingress.ingressClass.create Whether to create the ingress class.
  ## @param features.ingress.ingressClass.default Whether to set the ingress class as default.
  ##
  ingress:
    enabled: true # enabled by default
    controllerName: "k8s.ngrok.com/ingress-controller"
    watchNamespace: "" # default all
    ingressClass:
      name: ngrok
      create: true
      default: false

  ## @param features.gateway.enabled When true, Gateway API support will be enabled if the CRDs are detected. When false, Gateway API support will never be enabled
  ## @param features.gateway.disableReferenceGrants When true, disables required ReferenceGrants for cross-namespace references. Does nothing when features.gateway.enabled is false
  ##
  gateway:
    enabled: true # Enabled by default if the Gateway API CRDs are detected
    disableReferenceGrants: false

  ## @param features.bindings.enabled Whether to enable the Endpoint Bindings feature
  ## @param features.bindings.endpointSelectors List of cel expressions used to filter which kubernetes-bound endpoints should be projected into this cluster
  ## @param features.bindings.serviceAnnotations Annotations to add to projected services bound to an endpoint
  ## @param features.bindings.serviceLabels Labels to add to projected services bound to an endpoint
  ## @param features.bindings.ingressEndpoint The hostname of the ingress endpoint for the bindings
  ##
  bindings:
    enabled: false
    endpointSelectors:
    - "true"
    serviceAnnotations: {}
    serviceLabels: {}
    ingressEndpoint: "kubernetes-binding-ingress.ngrok.io:443"

  ## @param features.drainPolicy Policy for what to do with ngrok API resources while draining during an Uninstall. "Delete" removes ngrok API resources, "Retain" preserves them
  ##
  drainPolicy: "Retain" # "Delete" or "Retain"

  ## @param features.defaultDomainReclaimPolicy The default domain reclaim policy to use for domains created by the operator. Valid values are "Delete" and "Retain". The default is "Delete".
  ##
  defaultDomainReclaimPolicy: "Delete"

##
## @section API Manager parameters
##
## The api-manager is the primary operator component responsible for
## reconciling CRDs, managing ngrok API resources, and handling
## Ingress/Gateway API integration.
##
apiManager:
  ## Component-specific app config, merged over the shared `ngrok` and
  ## `features` config in the api-manager's config ConfigMap (keys set here
  ## win). For example, set `"log.level": debug` to change the log level for
  ## only this component.
  ## @param apiManager.config.oneClickDemoMode If true, then the operator will startup without required fields or API registration, become Ready, but not actually be running
  ##
  config:
    oneClickDemoMode: false

  ## @param apiManager.replicaCount The number of api-manager replicas to run.
  ## A minimum of 2 is recommended in production for HA.
  ##
  replicaCount: 1

  ## @param apiManager.podAnnotations Custom pod annotations to apply to api-manager pods.
  ## @param apiManager.podLabels Custom pod labels to apply to api-manager pods.
  podAnnotations: {}
  podLabels: {}

  ## @param apiManager.affinity Affinity for the api-manager pod assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## Note: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
  ##
  affinity: {}
  ## @param apiManager.podAffinityPreset Pod affinity preset. Ignored if `apiManager.affinity` is set. Allowed values: `soft` or `hard`
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAffinityPreset: ""
  ## @param apiManager.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `apiManager.affinity` is set. Allowed values: `soft` or `hard`
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAntiAffinityPreset: soft
  ## Node affinity preset
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ##
  nodeAffinityPreset:
    ## @param apiManager.nodeAffinityPreset.type Node affinity preset type. Ignored if `apiManager.affinity` is set. Allowed values: `soft` or `hard`
    ##
    type: ""
    ## @param apiManager.nodeAffinityPreset.key Node label key to match. Ignored if `apiManager.affinity` is set.
    ## E.g.
    ## key: "kubernetes.io/e2e-az-name"
    ##
    key: ""
    ## @param apiManager.nodeAffinityPreset.values Node label values to match. Ignored if `apiManager.affinity` is set.
    ## E.g.
    ## values:
    ##   - e2e-az1
    ##   - e2e-az2
    ##
    values: []

  ## @param apiManager.nodeSelector Node labels for api-manager pod(s)
  ## @param apiManager.tolerations Tolerations for api-manager pod(s)
  ## @param apiManager.topologySpreadConstraints Topology Spread Constraints for api-manager pod(s)
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  ## @param apiManager.priorityClassName Priority class for pod scheduling
  ## ref: https://kubernetes.io/docs/concepts/configuration/pod-priority-preemption/#priorityclass
  ##
  priorityClassName: ""

  ## @param apiManager.terminationGracePeriodSeconds The amount of time to wait for the pod to gracefully terminate
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination
  ## Increase this value to give the operator more time to clean up finalizers during shutdown
  ##
  terminationGracePeriodSeconds: 30

  ## @param apiManager.lifecycle an object containing lifecycle configuration
  ## ref: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/
  ##
  lifecycle: {}

  ## Pod Disruption Budget configuration
  ## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
  ## @param apiManager.podDisruptionBudget.create Enable a Pod Disruption Budget creation
  ## @param apiManager.podDisruptionBudget.maxUnavailable [string] Maximum number/percentage of pods that may be made unavailable
  ## @param apiManager.podDisruptionBudget.minAvailable [string] Minimum number/percentage of pods that should remain scheduled
  ##
  podDisruptionBudget:
    create: false
    maxUnavailable: "1"
    # minAvailable:

  ## api-manager container resource requests and limits
  ## ref: https://kubernetes.io/docs/user-guide/compute-resources/
  ## We usually recommend not to specify default resources and to leave this as a conscious
  ## choice for the user. This also increases chances charts run on environments with little
  ## resources, such as Minikube. If you do want to specify resources, uncomment the following
  ## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  ## @param apiManager.resources.limits The resources limits for the container
  ## @param apiManager.resources.requests The requested resources for the container
  ##
  resources:
    ## Example:
    ## limits:
    ##    cpu: 100m
    ##    memory: 128Mi
    ##
    limits: {}
    ## Examples:
    ## requests:
    ##    cpu: 100m
    ##    memory: 128Mi
    ##
    requests: {}

  ## @param apiManager.extraVolumes An array of extra volumes to add to the api-manager.
  ##
  extraVolumes: []
  ## @param apiManager.extraVolumeMounts An array of extra volume mounts to add to the api-manager.
  ##
  extraVolumeMounts: []
  ##
  ## Example:
  ##
  ## extraVolumes:
  ## - name: test-volume
  ##   emptyDir: {}
  ## extraVolumeMounts:
  ## - name: test-volume
  ##   mountPath: /test-volume

  ## @param apiManager.extraEnv an object of extra environment variables to add to the api-manager.
  ##
  extraEnv: {}
  ## Example:
  ##   MY_VAR: test
  ##   MY_SECRET_VAR:
  ##     secretKeyRef:
  ##       key: test-key
  ##       value: test-value
  ##   NGROK_OPERATOR_RESTART_ON_CERT_CHANGE: "false"

  ## api-manager Service Account Settings
  ## @param apiManager.serviceAccount.create Specifies whether a ServiceAccount should be created
  ## @param apiManager.serviceAccount.name The name of the ServiceAccount to use.
  ## If not set and create is true, a name is generated using the fullname template
  ## @param apiManager.serviceAccount.annotations Additional annotations to add to the ServiceAccount
  ##
  serviceAccount:
    create: true
    name: ""
    annotations: {}

##
## @section Agent parameters
##
## The agent (agent-manager) runs as a separate deployment responsible for
## managing ngrok agent tunnels for AgentEndpoint resources.
##
agent:
  ## Component-specific app config, merged over the shared `ngrok` and
  ## `features` config in the agent's config ConfigMap (keys set here win).
  ## For example, set `"log.level": debug` to change the log level for only
  ## this component.
  ## @param agent.config [object] Component-specific app config for the agent
  ##
  config: {}

  ## @param agent.replicaCount The number of agents to run.
  ##
  replicaCount: 1

  ## @param agent.podAnnotations Custom pod annotations to apply to agent pods.
  ## @param agent.podLabels Custom pod labels to apply to agent pods.
  podAnnotations: {}
  podLabels: {}

  ## @param agent.affinity Affinity for the agent pod assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## Note: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
  ##
  affinity: {}
  ## @param agent.podAffinityPreset Pod affinity preset. Ignored if `agent.affinity` is set. Allowed values: `soft` or `hard`
  ##
  podAffinityPreset: ""
  ## @param agent.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `agent.affinity` is set. Allowed values: `soft` or `hard`
  ##
  podAntiAffinityPreset: soft
  ## Node affinity preset
  ##
  nodeAffinityPreset:
    ## @param agent.nodeAffinityPreset.type Node affinity preset type. Ignored if `agent.affinity` is set. Allowed values: `soft` or `hard`
    ##
    type: ""
    ## @param agent.nodeAffinityPreset.key Node label key to match. Ignored if `agent.affinity` is set.
    ##
    key: ""
    ## @param agent.nodeAffinityPreset.values Node label values to match. Ignored if `agent.affinity` is set.
    ##
    values: []

  ## @param agent.nodeSelector Node labels for the agent pod(s)
  ## @param agent.tolerations Tolerations for the agent pod(s)
  ## @param agent.topologySpreadConstraints Topology Spread Constraints for the agent pod(s)
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  ## @param agent.priorityClassName Priority class for pod scheduling.
  ##
  priorityClassName: ""

  ## @param agent.terminationGracePeriodSeconds The amount of time to wait for the agent pod to gracefully terminate
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination
  ## Increase this value to give the operator more time to clean up finalizers during shutdown
  ##
  terminationGracePeriodSeconds: 30

  ## @param agent.lifecycle an object containing lifecycle configuration
  ## ref: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/
  ##
  lifecycle: {}

  ## @param agent.updateStrategy.type Agent update strategy
  ## @skip agent.updateStrategy.rollingUpdate
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  updateStrategy:
    ## StrategyType
    ## Can be set to RollingUpdate, OnDelete (statefulset), Recreate (deployment)
    ##
    type: RollingUpdate

  ## Agent container resource requests and limits
  ## ref: https://kubernetes.io/docs/user-guide/compute-resources/
  ## @param agent.resources.limits The resources limits for the container
  ## @param agent.resources.requests The requested resources for the container
  ##
  resources:
    limits: {}
    requests: {}

  ## @param agent.extraVolumes An array of extra volumes to add to the agent.
  ##
  extraVolumes: []
  ## @param agent.extraVolumeMounts An array of extra volume mounts to add to the agent.
  ##
  extraVolumeMounts: []

  ## @param agent.extraEnv an object of extra environment variables to add to the agent.
  ##
  extraEnv: {}

  ## Agent Service Account Settings
  ## @param agent.serviceAccount.create Specifies whether a ServiceAccount should be created for the agent.
  ## @param agent.serviceAccount.name The name of the ServiceAccount to use for the agent.
  ## If not set and create is true, a name is generated using the fullname template
  ## @param agent.serviceAccount.annotations Additional annotations to add to the agent ServiceAccount
  ##
  serviceAccount:
    create: true
    name: ""
    annotations: {}

##
## @section Bindings Forwarder parameters
##
## The bindings forwarder runs as a separate deployment responsible for
## forwarding traffic for bound endpoints. It is only deployed when
## `features.bindings.enabled` is `true`.
##
bindingsForwarder:
  ## Component-specific app config, merged over the shared `ngrok` and
  ## `features` config in the bindings-forwarder's config ConfigMap (keys set
  ## here win). For example, set `"log.level": debug` to change the log level
  ## for only this component.
  ## @param bindingsForwarder.config [object] Component-specific app config for the bindings forwarder
  ##
  config: {}

  ## @param bindingsForwarder.replicaCount The number of bindings forwarders to run.
  ##
  replicaCount: 1

  ## @param bindingsForwarder.podAnnotations Custom pod annotations to apply to bindings forwarder pods.
  ## @param bindingsForwarder.podLabels Custom pod labels to apply to bindings forwarder pods.
  podAnnotations: {}
  podLabels: {}

  ## @param bindingsForwarder.affinity Affinity for the bindings forwarder pod assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## Note: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
  ##
  affinity: {}
  ## @param bindingsForwarder.podAffinityPreset Pod affinity preset. Ignored if `bindingsForwarder.affinity` is set. Allowed values: `soft` or `hard`
  ##
  podAffinityPreset: ""
  ## @param bindingsForwarder.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `bindingsForwarder.affinity` is set. Allowed values: `soft` or `hard`
  ##
  podAntiAffinityPreset: soft
  ## Node affinity preset
  ##
  nodeAffinityPreset:
    ## @param bindingsForwarder.nodeAffinityPreset.type Node affinity preset type. Ignored if `bindingsForwarder.affinity` is set. Allowed values: `soft` or `hard`
    ##
    type: ""
    ## @param bindingsForwarder.nodeAffinityPreset.key Node label key to match. Ignored if `bindingsForwarder.affinity` is set.
    ##
    key: ""
    ## @param bindingsForwarder.nodeAffinityPreset.values Node label values to match. Ignored if `bindingsForwarder.affinity` is set.
    ##
    values: []

  ## @param bindingsForwarder.nodeSelector Node labels for the bindings forwarder pod(s)
  ## @param bindingsForwarder.tolerations Tolerations for the bindings forwarder pod(s)
  ## @param bindingsForwarder.topologySpreadConstraints Topology Spread Constraints for the bindings forwarder pod(s)
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  ## @param bindingsForwarder.priorityClassName Priority class for pod scheduling.
  ##
  priorityClassName: ""

  ## @param bindingsForwarder.terminationGracePeriodSeconds The amount of time to wait for the bindings forwarder pod to gracefully terminate
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination
  ## Increase this value to give the operator more time to clean up finalizers during shutdown
  ##
  terminationGracePeriodSeconds: 30

  ## @param bindingsForwarder.lifecycle an object containing lifecycle configuration
  ## ref: https://kubernetes.io/docs/concepts/containers/container-lifecycle-hooks/
  ##
  lifecycle: {}

  ## @param bindingsForwarder.updateStrategy.type Bindings Forwarder update strategy type
  ## @skip bindingsForwarder.updateStrategy.rollingUpdate
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  updateStrategy:
    ## StrategyType
    ## Can be set to RollingUpdate, OnDelete (statefulset), Recreate (deployment)
    ##
    type: RollingUpdate

  ## Bindings Forwarder container resource requests and limits
  ## ref: https://kubernetes.io/docs/user-guide/compute-resources/
  ## @param bindingsForwarder.resources.limits The resources limits for the container
  ## @param bindingsForwarder.resources.requests The requested resources for the container
  ##
  resources:
    limits: {}
    requests: {}

  ## @param bindingsForwarder.extraVolumes An array of extra volumes to add to the bindings forwarder.
  ##
  extraVolumes: []
  ## @param bindingsForwarder.extraVolumeMounts An array of extra volume mounts to add to the bindings forwarder.
  ##
  extraVolumeMounts: []

  ## @param bindingsForwarder.extraEnv an object of extra environment variables to add to the bindings forwarder.
  ##
  extraEnv: {}

  ## @param bindingsForwarder.serviceAccount.create Specifies whether a ServiceAccount should be created for the bindings forwarder pod(s).
  ## @param bindingsForwarder.serviceAccount.name The name of the ServiceAccount to use for the bindings forwarder pod(s).
  ## If not set and create is true, a name is generated using the fullname template
  ## @param bindingsForwarder.serviceAccount.annotations Additional annotations to add to the bindings-forwarder ServiceAccount
  ##
  serviceAccount:
    create: true
    name: ""
    annotations: {}

##
## @section CRD Access Role Settings
##
## @param crdAccessRoles.create Whether to create editor/viewer ClusterRoles for CRDs
## @param crdAccessRoles.annotations Annotations for CRD access ClusterRoles (e.g., RBAC aggregation)
## Commonly used for RBAC role aggregation (e.g., aggregate into the built-in admin/edit roles).
##
crdAccessRoles:
  create: true
  annotations: {}

## @section Custom Resource Definitions installation
##

## @param installCRDs When true, the ngrok CRDs will be installed alongside the operator
installCRDs: true

##
## @section Cleanup Hook configuration
##
## The cleanup hook is lifecycle infrastructure (a pre-delete Helm hook) that
## runs independent of any operator feature flag, so it lives at the top level
## rather than under `features`.
##
## @param cleanupHook.enabled Enable the pre-delete cleanup hook that drains resources before uninstall
## @param cleanupHook.timeout Timeout in seconds for the cleanup process
## @param cleanupHook.image.repository The repository for the kubectl image used by the cleanup hook
## @param cleanupHook.image.tag The tag for the kubectl image
## @param cleanupHook.image.pullPolicy The pull policy for the cleanup hook image
## @param cleanupHook.resources.limits.cpu CPU limit for the cleanup hook container
## @param cleanupHook.resources.limits.memory Memory limit for the cleanup hook container
## @param cleanupHook.resources.requests.cpu CPU request for the cleanup hook container
## @param cleanupHook.resources.requests.memory Memory request for the cleanup hook container
##
cleanupHook:
  enabled: true
  timeout: 300
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
