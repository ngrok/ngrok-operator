{{- if .Values.bindings.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - bindings.k8s.ngrok.com
  resources:
  - boundendpoints
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ngrok.k8s.ngrok.com
  resources:
  - kubernetesoperators
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder
subjects:
- kind: ServiceAccount
  name: {{ template "ngrok-operator.bindings.forwarder.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
# The bindings-forwarder watches Pods cluster-wide. It reconciles bindings
# across namespaces and must discover consumer Pods regardless of where they
# run, so `watchNamespace` does not apply here — this ClusterRole and
# ClusterRoleBinding are always rendered.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ngrok-operator.fullname" . }}-bindings-forwarder
subjects:
- kind: ServiceAccount
  name: {{ template "ngrok-operator.bindings.forwarder.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
