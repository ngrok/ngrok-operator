{{- $component := "controller" }}
{{- $apiManager := .Values.apiManager }}
{{- $configChecksum := include "ngrok-operator.componentConfig" (dict "context" $ "config" $apiManager.config) | sha256sum }}
{{- $configEnvKeys := list
  (list "NGROK_OPERATOR_DESCRIPTION" "description")
  (list "NGROK_OPERATOR_REGION" "region")
  (list "NGROK_OPERATOR_SERVER_ADDR" "serverAddr")
  (list "NGROK_OPERATOR_API_URL" "apiURL")
  (list "NGROK_OPERATOR_METADATA" "metadata")
  (list "NGROK_OPERATOR_CLUSTER_DOMAIN" "clusterDomain")
  (list "NGROK_OPERATOR_LOG_LEVEL" "log.level")
  (list "NGROK_OPERATOR_LOG_FORMAT" "log.format")
  (list "NGROK_OPERATOR_LOG_STACKTRACE_LEVEL" "log.stacktraceLevel")
  (list "NGROK_OPERATOR_ONE_CLICK_DEMO_MODE" "oneClickDemoMode")
  (list "NGROK_OPERATOR_FEATURES_INGRESS_ENABLED" "features.ingress.enabled")
  (list "NGROK_OPERATOR_FEATURES_INGRESS_CONTROLLER_NAME" "features.ingress.controllerName")
  (list "NGROK_OPERATOR_FEATURES_INGRESS_WATCH_NAMESPACE" "features.ingress.watchNamespace")
  (list "NGROK_OPERATOR_FEATURES_GATEWAY_ENABLED" "features.gateway.enabled")
  (list "NGROK_OPERATOR_FEATURES_GATEWAY_DISABLE_REFERENCE_GRANTS" "features.gateway.disableReferenceGrants")
  (list "NGROK_OPERATOR_FEATURES_BINDINGS_ENABLED" "features.bindings.enabled")
  (list "NGROK_OPERATOR_FEATURES_BINDINGS_ENDPOINT_SELECTORS" "features.bindings.endpointSelectors")
  (list "NGROK_OPERATOR_FEATURES_BINDINGS_SERVICE_ANNOTATIONS" "features.bindings.serviceAnnotations")
  (list "NGROK_OPERATOR_FEATURES_BINDINGS_SERVICE_LABELS" "features.bindings.serviceLabels")
  (list "NGROK_OPERATOR_FEATURES_BINDINGS_INGRESS_ENDPOINT" "features.bindings.ingressEndpoint")
  (list "NGROK_OPERATOR_FEATURES_DRAIN_POLICY" "features.drainPolicy")
  (list "NGROK_OPERATOR_FEATURES_DEFAULT_DOMAIN_RECLAIM_POLICY" "features.defaultDomainReclaimPolicy")
}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "ngrok-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  name: {{ include "ngrok-operator.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- with (include "ngrok-operator.commonAnnotations" .) }}
    {{- . | nindent 4 }}
    {{- end }}
    checksum/controller-role: {{ include (print $.Template.BasePath "/api-manager/role.yaml") . | sha256sum }}
    checksum/rbac: {{ include (print $.Template.BasePath "/api-manager/leader-election-role.yaml") . | sha256sum }}
spec:
  replicas: {{ $apiManager.replicaCount }}
  selector:
    matchLabels:
      {{- include "ngrok-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      annotations:
        {{- if $apiManager.podAnnotations }}
          {{- toYaml $apiManager.podAnnotations | nindent 8 }}
        {{- end }}
        prometheus.io/path: /metrics
        prometheus.io/port: '8080'
        prometheus.io/scrape: 'true'
        checksum/controller-role: {{ include (print $.Template.BasePath "/api-manager/role.yaml") . | sha256sum }}
        checksum/rbac: {{ include (print $.Template.BasePath "/api-manager/leader-election-role.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/credentials-secret.yaml") . | sha256sum }}
        checksum/config: {{ $configChecksum }}
      labels:
        {{- include "ngrok-operator.selectorLabels" . | nindent 8 }}
        {{- if $apiManager.podLabels }}
          {{- toYaml $apiManager.podLabels | nindent 8 }}
        {{- end }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      {{- if $apiManager.priorityClassName }}
      priorityClassName: {{ $apiManager.priorityClassName | quote }}
      {{- end }}
      {{- if $apiManager.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ $apiManager.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if $apiManager.affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" $apiManager.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity: {{- include "common.affinities.pods" (dict "type" $apiManager.podAffinityPreset "component" $component "context" $) | nindent 10 }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" $apiManager.podAntiAffinityPreset "component" $component "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" $apiManager.nodeAffinityPreset.type "key" $apiManager.nodeAffinityPreset.key "values" $apiManager.nodeAffinityPreset.values) | nindent 10 }}
      {{- end }}
      {{- with $apiManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{ with $apiManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $apiManager.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "ngrok-operator.serviceAccountName" . }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: ngrok-operator
        image: {{ include "ngrok-operator.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /ngrok-operator
        args:
        - api-manager
        - --release-name={{ .Release.Name }}
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        - --election-id={{ include "ngrok-operator.fullname" . }}-leader
        - --manager-name={{ include "ngrok-operator.fullname" . }}-manager
        securityContext:
          allowPrivilegeEscalation: false
        env:
        - name: NGROK_API_KEY
          valueFrom:
            secretKeyRef:
              key: API_KEY
              name: {{ include "ngrok-operator.credentialsSecretName" . }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: HELM_RELEASE_NAME
          value: {{ .Release.Name | quote }}
        {{- include "ngrok-operator.configEnv" (dict "context" $ "component" "api-manager" "keys" $configEnvKeys) | trim | nindent 8 }}
        {{- range $key, $value := $apiManager.extraEnv }}
        - name: {{ $key }}
          value: {{- toYaml $value | nindent 12 }}
        {{- end }}
        {{- if $apiManager.extraVolumeMounts }}
        volumeMounts:
        {{- toYaml $apiManager.extraVolumeMounts | nindent 8 }}
        {{- end }}
        {{- if $apiManager.lifecycle }}
        lifecycle:
        {{ toYaml $apiManager.lifecycle | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
        {{- toYaml $apiManager.resources | nindent 10 }}
      {{- if $apiManager.extraVolumes }}
      volumes:
        {{- toYaml $apiManager.extraVolumes | nindent 6 }}
      {{- end }}
