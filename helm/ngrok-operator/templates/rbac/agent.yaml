{{- $watchNamespace := include "ngrok-operator.watchNamespace" . -}}
{{- $isNamespaced := ne $watchNamespace "" -}}
{{- $generated := .Files.Get "files/rbac/agent/role.yaml" | fromYaml -}}
{{ $roleName := printf "%s-agent-role" (include "ngrok-operator.fullname" .) }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $isNamespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
  name: {{ $roleName }}
  {{- if $isNamespaced }}
  namespace: {{ $watchNamespace }}
  {{- end }}
rules:
{{- toYaml $generated.rules | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $isNamespaced }}
kind: RoleBinding
{{- else }}
kind: ClusterRoleBinding
{{- end }}
metadata:
  name: {{ include "ngrok-operator.fullname" . }}-agent-rolebinding
  {{- if $isNamespaced }}
  namespace: {{ $watchNamespace }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if $isNamespaced }}
  kind: Role
  {{- else }}
  kind: ClusterRole
  {{- end }}
  name: {{ $roleName }}
subjects:
- kind: ServiceAccount
  name: {{ template "ngrok-operator.agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
