name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    types: [checks_requested]

env:
  DOCKER_BUILDX_PLATFORMS: linux/amd64,linux/arm64

jobs:

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      actions: ${{ steps.changes.outputs.actions }}
      charts: ${{ steps.changes.outputs.charts }}
      chartyaml: ${{ steps.changes.outputs.chartyaml }}
      go: ${{ steps.changes.outputs.go }}
      tag: ${{ steps.changes.outputs.tag }}
      tests: ${{ steps.changes.outputs.tests }}
      make: ${{ steps.changes.outputs.make }}
      nix: ${{ steps.changes.outputs.nix }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: "./.github/actions/changes"
      id: changes

  basic-tests:
    name: Basic Tests
    needs: [changes]
    uses: ./.github/workflows/basic-tests.yaml
    secrets: inherit
    with:
      go-changed: ${{ needs.changes.outputs.go == 'true' }}
      make-changed: ${{ needs.changes.outputs.make == 'true' }}
      nix-changed: ${{ needs.changes.outputs.nix == 'true' }}

  manifest-bundle-diff:
    name: Manifest Bundle Diff
    runs-on: ubuntu-latest
    needs:
    - changes
    if: |
      (needs.changes.outputs.charts == 'true') ||
      (needs.changes.outputs.make == 'true') ||
      (needs.changes.outputs.nix == 'true')
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: ./.github/actions/nix-setup
    - name: Generate manifest bundle
      run: make manifest-bundle
    - name: Fail if there are uncommitted manifest bundle changes
      run: git diff --exit-code manifest-bundle.yaml

  build-images:
    name: Build Images
    needs:
    - changes
    - basic-tests
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
    - id: buildx-setup
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      with:
        platforms: ${{ env.DOCKER_BUILDX_PLATFORMS }}
    - name: Build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: ${{ steps.buildx-setup.outputs.platforms }}
        push: false
        tags: ngrok/ngrok-operator:latest

  build-and-test:
    runs-on: ubuntu-latest
    needs:
    - changes
    - basic-tests
    if: |
      always() && !failure() && !cancelled() &&
      (
        (github.event_name == 'push' && github.ref_name == 'main')
        ||
        (
          (needs.changes.outputs.actions == 'true') ||
          (needs.changes.outputs.go == 'true') ||
          (needs.changes.outputs.charts == 'true') ||
          (needs.changes.outputs.chartyaml == 'true') ||
          (needs.changes.outputs.tests == 'true') ||
          (needs.changes.outputs.make == 'true') ||
          (needs.changes.outputs.nix == 'true')
        )
      )
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Nix
      uses: ./.github/actions/nix-setup
    - uses: "./.github/actions/build-and-test"
      with:
        # this workflow is for incoming PRs, so we want to skip e2e tests
        # and deploy the demo mode because our api keys are not available
        # on contributor's forks
        run-e2e: false

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: |
      (needs.changes.outputs.nix == 'true') ||
      (needs.changes.outputs.charts == 'true')
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Nix
      uses: ./.github/actions/nix-setup
    - name: Lint Helm Chart
      run: make helm-lint
    - name: Helm Unit Tests
      run: make helm-test

  e2e:
    runs-on: ubuntu-latest
    needs:
    - changes
    - basic-tests
    - helm
    # Only run one e2e test at a time to avoid stomping on each other
    concurrency:
      group: e2e
      cancel-in-progress: false
    timeout-minutes: 20
    # Only run the e2e tests if on the main branch or in a merge queue and
    # files have changed that require e2e tests
    if: |
      always() && !failure() && !cancelled() &&
      (github.repository == 'ngrok/ngrok-operator') &&
      (
        (github.event_name == 'push' && github.ref_name == 'main') ||
        (github.event_name == 'merge_group')
      ) &&
      (
        (needs.changes.outputs.go == 'true') ||
        (needs.changes.outputs.charts == 'true') ||
        (needs.changes.outputs.chartyaml == 'true') ||
        (needs.changes.outputs.tests == 'true') ||
        (needs.changes.outputs.make == 'true') ||
        (needs.changes.outputs.nix == 'true')
      )
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Nix
      uses: ./.github/actions/nix-setup
    - uses: "./.github/actions/build-and-test"
      with:
        run-e2e: true
        ngrok-api-key: ${{ secrets.NGROK_CI_API_KEY }}
        ngrok-authtoken: ${{ secrets.NGROK_CI_AUTHTOKEN }}

  e2e-multi-namespace:
    runs-on: ubuntu-latest
    needs:
    - changes
    - basic-tests
    - e2e
    concurrency:
      group: e2e
      cancel-in-progress: false
    timeout-minutes: 30
    if: |
      always() && !failure() && !cancelled() &&
      (github.repository == 'ngrok/ngrok-operator') &&
      (
        (github.event_name == 'push' && github.ref_name == 'main') ||
        (github.event_name == 'merge_group')
      ) &&
      (
        (needs.changes.outputs.go == 'true') ||
        (needs.changes.outputs.charts == 'true') ||
        (needs.changes.outputs.chartyaml == 'true') ||
        (needs.changes.outputs.tests == 'true') ||
        (needs.changes.outputs.make == 'true') ||
        (needs.changes.outputs.nix == 'true')
      )
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Nix
      uses: ./.github/actions/nix-setup
    - name: Create Kind Cluster
      run: make kind-create
    - name: Deploy
      run: make deploy_multi_namespace
      env:
        NGROK_API_KEY: ${{ secrets.NGROK_CI_API_KEY }}
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_CI_AUTHTOKEN }}
    - name: Test
      run: make e2e-tests-multi-ns
    - name: Cleanup
      if: always()
      run: |
        echo "Deleting kubernetesoperators..."
        kubectl -n namespace-a delete kubernetesoperator ngrok-operator-a || true
        kubectl -n namespace-b delete kubernetesoperator ngrok-operator-b || true
        echo "Uninstalling the operators..."
        helm uninstall ngrok-operator-a -n namespace-a || true
        helm uninstall ngrok-operator-b -n namespace-b || true

  e2e-uninstall:
    runs-on: ubuntu-latest
    needs:
    - changes
    - basic-tests
    - e2e-multi-namespace
    concurrency:
      group: e2e
      cancel-in-progress: false
    timeout-minutes: 60
    if: |
      always() && !failure() && !cancelled() &&
      (github.repository == 'ngrok/ngrok-operator') &&
      (
        (github.event_name == 'push' && github.ref_name == 'main') ||
        (github.event_name == 'merge_group')
      ) &&
      (
        (needs.changes.outputs.go == 'true') ||
        (needs.changes.outputs.charts == 'true') ||
        (needs.changes.outputs.chartyaml == 'true') ||
        (needs.changes.outputs.tests == 'true') ||
        (needs.changes.outputs.make == 'true') ||
        (needs.changes.outputs.nix == 'true')
      )
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Nix
      uses: ./.github/actions/nix-setup
    - name: Create Kind Cluster
      run: make kind-create
    - name: Run Uninstall E2E Tests
      env:
        NGROK_API_KEY: ${{ secrets.NGROK_CI_API_KEY }}
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_CI_AUTHTOKEN }}
      run: make e2e-uninstall-all
    - name: Cleanup
      if: always()
      run: make e2e-clean-uninstall
