# Scenario: bindings-delete-policy
# Tests BoundEndpoint behavior during uninstall with Delete drain policy
#
# - features.drainPolicy: Delete
# - features.bindings.enabled: true (enables BoundEndpoint feature)
# - installCRDs: true (bundled CRDs for simplicity)

features:
  drainPolicy: Delete
  bindings:
    enabled: true
    endpointSelectors:
      - "true"  # Accept all kubernetes-bound endpoints
