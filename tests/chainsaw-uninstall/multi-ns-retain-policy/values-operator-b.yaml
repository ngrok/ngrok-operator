# Scenario: multi-ns-retain-policy - Operator B
# Namespace-scoped operator watching namespace-b only

installCRDs: false

features:
  drainPolicy: Retain
  ingress:
    # REQUIRED for multi-operator: Each operator MUST watch only its own namespace
    watchNamespace: namespace-b
    controllerName: k8s.ngrok.com/ingress-controller-b
    ingressClass:
      name: ngrok-b
