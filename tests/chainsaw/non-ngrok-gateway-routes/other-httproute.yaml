# HTTPRoute targeting the third-party Gateway.
# The ngrok operator must not add k8s.ngrok.com/finalizer or write .status.parents
# entries for this route (it doesn't own the parent Gateway).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: other-httproute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: other-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: other-backend-svc
          port: 80
