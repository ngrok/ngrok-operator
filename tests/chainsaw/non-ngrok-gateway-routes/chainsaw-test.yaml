# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# Regression test for https://github.com/ngrok/ngrok-operator/issues/769
#
# The ngrok operator must NOT add its finalizer or write .status.parents entries
# to HTTPRoutes (or TLSRoutes / TCPRoutes) whose parentRefs point to a Gateway
# managed by a different controller.  Before the fix the reconciler ran
# RegisterAndSyncFinalizer() and validateRouteParentRefs() before the
# GatewayClass ownership check, so it stamped every route cluster-wide.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: non-ngrok-gateway-routes
spec:
  # Chainsaw creates a fresh namespace for each run; GatewayClass is cluster-scoped
  # so we apply/delete it explicitly in the steps below.
  timeouts:
    apply: 30s
    assert: 30s
    delete: 30s
    exec: 30s
  steps:
    # ------------------------------------------------------------------
    # Setup
    # ------------------------------------------------------------------
    - name: apply third-party GatewayClass (cluster-scoped)
      try:
        - apply:
            file: ./other-gatewayclass.yaml

    - name: create third-party Gateway and HTTPRoute
      try:
        - create:
            file: ./other-gateway.yaml
        - create:
            file: ./other-httproute.yaml

    # ------------------------------------------------------------------
    # Give the operator enough time to reconcile the resources.
    # If the bug were present the finalizer/status would appear within
    # a few seconds.  15 s provides a comfortable margin.
    # ------------------------------------------------------------------
    - name: wait for operator to process resources
      try:
        - sleep:
            duration: 15s

    # ------------------------------------------------------------------
    # Assert the ngrok operator left the HTTPRoute untouched
    # ------------------------------------------------------------------
    - name: verify ngrok operator did not add finalizer to HTTPRoute
      try:
        - script:
            timeout: 10s
            content: |
              FINALIZERS=$(kubectl get httproute other-httproute \
                -n "$NAMESPACE" \
                -o jsonpath='{.metadata.finalizers}' 2>/dev/null)

              if echo "$FINALIZERS" | grep -q "k8s.ngrok.com/finalizer"; then
                echo "FAIL: ngrok finalizer was incorrectly added to a non-ngrok HTTPRoute"
                echo "  finalizers: $FINALIZERS"
                exit 1
              fi
              echo "PASS: HTTPRoute has no ngrok finalizer (finalizers: ${FINALIZERS:-<none>})"

    - name: verify ngrok operator did not write status to HTTPRoute
      try:
        - script:
            timeout: 10s
            content: |
              CONTROLLERS=$(kubectl get httproute other-httproute \
                -n "$NAMESPACE" \
                -o jsonpath='{.status.parents[*].controllerName}' 2>/dev/null)

              if echo "$CONTROLLERS" | grep -q "ngrok.com"; then
                echo "FAIL: ngrok controller wrote .status.parents to a non-ngrok HTTPRoute"
                echo "  controllerNames: $CONTROLLERS"
                exit 1
              fi
              echo "PASS: HTTPRoute has no ngrok controller status entries (controllers: ${CONTROLLERS:-<none>})"

    # ------------------------------------------------------------------
    # Cleanup cluster-scoped resources not removed by namespace deletion
    # ------------------------------------------------------------------
    - name: delete third-party GatewayClass
      try:
        - delete:
            ref:
              apiVersion: gateway.networking.k8s.io/v1
              kind: GatewayClass
              name: other-controller
